<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/codeos-app-icon.png" />
    <link rel="apple-touch-icon" href="/codeos-app-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CODE OS</title>
    <script>
      try {
        const theme = localStorage.getItem("code-os:theme");
        if (theme) {
          const root = document.documentElement;
          if (theme === "system") {
            const isLight = window.matchMedia("(prefers-color-scheme: light)").matches;
            root.setAttribute("data-theme", isLight ? "light" : "dark");
            if (isLight) root.classList.add("light");
          } else {
            root.setAttribute("data-theme", theme);
            if (theme !== "dark") root.classList.add(theme);
          }
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
